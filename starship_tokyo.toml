add_newline = false
format = """
[вЦУ](#a3aed2)\
[ пРІ ](bg:#a3aed2 fg:#090c0c)\
[оВі](bg:#769ff0 fg:#a3aed2)\
$directory\
[оВі](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оВі](fg:#394260 bg:#212736)\
$c\
$java\
$kotlin\
$haskell\
$python\
$nodejs\
$rust\
